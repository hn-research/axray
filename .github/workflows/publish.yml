name: publish

# Triggers on git tags shaped `v0.1.0`, `v0.2.0`, etc. The tag drives
# the publish; nothing publishes on main pushes.
on:
  push:
    tags:
      - 'v*'

# id-token: write is required for npm provenance attestation (OIDC).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Belt and braces: even though `prepublishOnly` re-runs these, we
      # also gate the publish on a fresh, full pass here so a regression
      # never reaches npm.
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
